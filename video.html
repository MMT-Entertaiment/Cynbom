<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéo - Cynbom</title>
<script src="https://www.youtube.com/iframe_api"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }

.player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
.player { width: 100%; height: 100%; aspect-ratio: 16/9; }
.player iframe { width: 100%; height: 100%; border: none; display: block; }

/* État: Pas de vidéo/Erreur */
.player-container.error-state {
  flex-direction: column;
  gap: 20px;
}

.player-container.error-state .player {
  aspect-ratio: unset;
  width: auto;
  height: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #999;
}

.player-container.error-state .episodes-nav {
  display: none;
}

.episodes-nav { 
  position: absolute; 
  bottom: 48px; 
  left: 50%; 
  transform: translateX(-50%); 
  z-index: 9999; 
  display: flex; 
  gap: 16px; 
  opacity: 0;
  transition: opacity 0.3s;
}

.episodes-nav.visible {
  opacity: 1;
}

.ep-btn { 
  background: none; 
  border: none; 
  cursor: pointer; 
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
}

.ep-btn svg {
  width: 28px;
  height: 28px;
  fill: #fff;
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
}

.ep-btn:hover:not(:disabled) svg {
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.5));
  transform: scale(1.1);
}

.ep-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.ep-btn:disabled svg {
  fill: #666;
}

@media (max-aspect-ratio: 16/9) {
  .player { width: 100%; height: auto; }
  body { align-items: flex-start; }
}
</style>
</head>
<body>

<div class="player-container" id="player-container">
  <div class="player" id="player"></div>
  <div class="episodes-nav" id="episodes-nav">
    <button class="ep-btn" id="prev-btn" onclick="prevEpisode()" disabled title="Épisode précédent">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M220-280v-400q0-17 11.5-28.5T260-720q17 0 28.5 11.5T300-680v400q0 17-11.5 28.5T260-240q-17 0-28.5-11.5T220-280Zm458-1L430-447q-9-6-13.5-14.5T412-480q0-10 4.5-18.5T430-513l248-166q5-4 11-5t11-1q16 0 28 11t12 29v330q0 18-12 29t-28 11q-5 0-11-1t-11-5Z"/></svg>
    </button>
    <button class="ep-btn" id="next-btn" onclick="nextEpisode()" disabled title="Épisode suivant">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M660-280v-400q0-17 11.5-28.5T700-720q17 0 28.5 11.5T740-680v400q0 17-11.5 28.5T700-240q-17 0-28.5-11.5T660-280Zm-440-35v-330q0-18 12-29t28-11q5 0 11 1t11 5l248 166q9 6 13.5 14.5T548-480q0 10-4.5 18.5T530-447L282-281q-5 4-11 5t-11 1q-16 0-28-11t-12-29Z"/></svg>
    </button>
  </div>
</div>

<script>
const API = 'https://cynbom-backend-production.up.railway.app';
const urlParams = new URLSearchParams(window.location.search);
const serieTitle = urlParams.get('serie');
const epParam = urlParams.get('ep'); // Format: S01E01 ou E01.S01

let player;
let videoUrl = null;
let allEpisodes = [];
let currentEpisodeIndex = -1;

function getYouTubeId(url) {
  if (!url) return null;
  const shortMatch = url.match(/youtu\.be\/([^?]+)/);
  if (shortMatch) return shortMatch[1];
  const longMatch = url.match(/[?&]v=([^&]+)/);
  return longMatch ? longMatch[1] : null;
}

function parseEpisodeParam(param) {
  if (!param) return null;
  
  // Format: S01E09 (saison numérique) or SShortE01 (saison textuelle) or E09.S01 (autre)
  
  // Format: SxxxxxExxx (saison textuelle)
  const textMatch = param.match(/S([a-z]+)E(\d+)/i);
  if (textMatch) return { saison: textMatch[1], numero: parseInt(textMatch[2], 10) };
  
  // Format: S01E09 (saison numérique)
  const numMatch = param.match(/S(\d+)E(\d+)/i);
  if (numMatch) return { saison: numMatch[1], numero: parseInt(numMatch[2], 10) };
  
  // Format: E09.S01 (alternative)
  const altMatch = param.match(/E(\d+)\.S(.+)/i);
  if (altMatch) return { saison: altMatch[2], numero: parseInt(altMatch[1], 10) };
  
  return null;
}

function goBack() {
  if (serieTitle) {
    window.location.href = `serie.html?titre=${encodeURIComponent(serieTitle)}`;
  } else {
    history.back();
  }
}

function updateNavigationButtons() {
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  
  prevBtn.disabled = currentEpisodeIndex <= 0;
  nextBtn.disabled = currentEpisodeIndex >= allEpisodes.length - 1;
}

function prevEpisode() {
  if (currentEpisodeIndex > 0) {
    const prevEp = allEpisodes[currentEpisodeIndex - 1];
    const epParam = `S${prevEp.saison.toString().padStart(2, '0')}E${prevEp.numero.toString().padStart(2, '0')}`;
    window.location.href = `video.html?serie=${encodeURIComponent(serieTitle)}&ep=${epParam}`;
  }
}

function nextEpisode() {
  if (currentEpisodeIndex < allEpisodes.length - 1) {
    const nextEp = allEpisodes[currentEpisodeIndex + 1];
    const epParam = `S${nextEp.saison.toString().padStart(2, '0')}E${nextEp.numero.toString().padStart(2, '0')}`;
    window.location.href = `video.html?serie=${encodeURIComponent(serieTitle)}&ep=${epParam}`;
  }
}

// Detect fullscreen exit
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && serieTitle) {
    goBack();
  }
});

// Fallback for when user clicks back/escape
window.addEventListener('beforeunload', () => {
  // Nettoyage si nécessaire
});

async function init() {
  if (!serieTitle || !epParam) {
    document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Paramètres manquants: serie=' + serieTitle + ', ep=' + epParam + '</div>';
    document.getElementById('player-container').classList.add('error-state');
    return;
  }

  try {
    // Récupérer la série
    const resServe = await fetch(`${API}/series`);
    if (!resServe.ok) throw new Error('Erreur API séries: ' + resServe.status);
    const series = await resServe.json();
    const serie = series.find(s => s.titre === serieTitle);
    
    if (!serie) {
      document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Série introuvable: ' + serieTitle + '</div>';
      document.getElementById('player-container').classList.add('error-state');
      return;
    }

    // Récupérer les épisodes
    const resEp = await fetch(`${API}/series/${encodeURIComponent(serieTitle)}/episodes`);
    if (!resEp.ok) throw new Error('Erreur API épisodes: ' + resEp.status);
    allEpisodes = await resEp.json();
    
    // Parser le paramètre d'épisode
    const epData = parseEpisodeParam(epParam);
    if (!epData) {
      document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Format d\'épisode invalide: ' + epParam + '</div>';
      document.getElementById('player-container').classList.add('error-state');
      return;
    }

    // Trouver l'épisode et son index
    currentEpisodeIndex = allEpisodes.findIndex(ep => 
      String(parseInt(ep.saison)) === String(parseInt(epData.saison)) && ep.numero == epData.numero
    );

    if (currentEpisodeIndex === -1) {
      document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Épisode S' + epData.saison + 'E' + epData.numero + ' introuvable</div>';
      document.getElementById('player-container').classList.add('error-state');
      return;
    }

    const episode = allEpisodes[currentEpisodeIndex];
    if (!episode.video) {
      document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Pas de vidéo pour cet épisode</div>';
      document.getElementById('player-container').classList.add('error-state');
      return;
    }

    videoUrl = episode.video;
    const videoId = getYouTubeId(videoUrl);
    
    if (!videoId) {
      document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">URL YouTube invalide: ' + videoUrl + '</div>';
      document.getElementById('player-container').classList.add('error-state');
      return;
    }

    // État: Vidéo chargée
    document.getElementById('player-container').classList.remove('error-state');

    // Update navigation buttons
    updateNavigationButtons();

    // Attendre que YT API soit prête
    if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
      // YT pas encore chargé, attendre
      let attempts = 0;
      const waitForYT = setInterval(() => {
        attempts++;
        if (typeof YT !== 'undefined' && typeof YT.Player !== 'undefined') {
          clearInterval(waitForYT);
          loadYouTubePlayer(videoId);
        } else if (attempts > 50) {
          clearInterval(waitForYT);
          document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Erreur: YouTube API non disponible</div>';
        }
      }, 100);
    } else {
      loadYouTubePlayer(videoId);
    }

  } catch (e) {
    console.error(e);
    document.getElementById('player').innerHTML = '<div style="color:#999;font-size:16px;">Erreur: ' + e.message + '</div>';
    document.getElementById('player-container').classList.add('error-state');
  }
}

function onPlayerReady(event) {
  // Player prêt - afficher les boutons et mettre en fullscreen
  showControls();
  
  setTimeout(() => {
    const playerElem = document.querySelector('iframe');
    if (playerElem && playerElem.requestFullscreen) {
      playerElem.requestFullscreen().catch((err) => {
        console.log('Fullscreen erreur:', err);
      });
    }
  }, 100);
}

function loadYouTubePlayer(videoId) {
  player = new YT.Player('player', {
    videoId: videoId,
    playerVars: {
      autoplay: 1,
      fs: 1,
      rel: 0,
      controls: 1,
      modestbranding: 1
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  // Optionnel: gérer les changements d'état
  // 0 = fin, 1 = lecture, 2 = pause, -1 = non démarré
}

// Détection de sortie via ESC ou back button
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    goBack();
  }
});

// Logique d'apparition/disparition des boutons avec l'interface YouTube
let controlsHideTimer;
const playerContainer = document.getElementById('player-container');
const episodesNav = document.getElementById('episodes-nav');

function showControls() {
  episodesNav.classList.add('visible');
  clearTimeout(controlsHideTimer);
  controlsHideTimer = setTimeout(() => {
    episodesNav.classList.remove('visible');
  }, 3000);
}

// Afficher/masquer avec mouvement souris ou toucher
playerContainer.addEventListener('mousemove', showControls);
playerContainer.addEventListener('touchstart', showControls);
playerContainer.addEventListener('touchmove', showControls);

init();

</script>
</body>
</html>
