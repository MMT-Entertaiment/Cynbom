<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cynbom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 400px; margin: 0 auto; }

  /* HEADER */
  .header { position: relative; }
  .header-img { width: 100%; height: 260px; object-fit: cover; display: block; }
  .header-placeholder { width: 100%; height: 260px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #333; }
  .header-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to bottom, transparent, #000); }
  .back-btn { position: absolute; top: 20px; left: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 0.5px solid #333; }
  .back-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* INFOS */
  .info { padding: 16px 20px 0; }
  .serie-title { font-size: 24px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
  .serie-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag { font-size: 11px; color: #888; background: #111; border: 0.5px solid #222; padding: 3px 8px; border-radius: 4px; }
  .tag.age { color: #fff; border-color: #333; background: #1a1a1a; }

  /* LECTEUR */
  .player { margin: 0 20px 24px; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 16/9; border: 0.5px solid #1a1a1a; }
  .player iframe { width: 100%; height: 100%; border: none; display: block; }
  .player-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #333; font-size: 13px; }
  .player-placeholder svg { width: 32px; height: 32px; stroke: #333; fill: none; stroke-width: 1.5; }

  /* ÉPISODES */
  .section-title { font-size: 14px; font-weight: 500; color: #fff; padding: 0 20px; margin-bottom: 12px; }
  .episodes { padding: 0 20px; padding-bottom: 40px; }
  .saison-label { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 1px; text-transform: uppercase; margin: 16px 0 8px; }
  .ep-card { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; transition: opacity 0.15s; }
  .ep-card:active { opacity: 0.6; }
  .ep-card.active-ep .ep-num { color: #fff; }
  .ep-card.active-ep { opacity: 1; }
  .ep-num { font-size: 13px; font-weight: 600; color: #444; width: 28px; flex-shrink: 0; text-align: center; }
  .ep-info { flex: 1; }
  .ep-title { font-size: 13px; font-weight: 500; color: #fff; }
  .ep-meta { font-size: 11px; color: #555; margin-top: 2px; }
  .ep-play { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ep-play svg { width: 12px; height: 12px; fill: #888; margin-left: 1px; }
  .ep-play.has-video { border-color: #fff; }
  .ost-player { margin: 0 20px 24px; }
  .ost-cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; display: block; border: 0.5px solid #1a1a1a; margin-bottom: 16px; }
  .ost-cover-placeholder { width: 100%; aspect-ratio: 1/1; border-radius: 12px; background: #111; border: 0.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; color: #333; font-size: 13px; margin-bottom: 16px; }
  .ost-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 16px; }
  .ost-btn { background: transparent; border: none; cursor: pointer; padding: 8px; }
  .ost-btn img { width: 32px; height: 32px; opacity: 0.7; transition: opacity 0.2s; }
  .ost-btn:hover img { opacity: 1; }
  .ost-progress-wrap { margin-bottom: 12px; }
  .ost-progress-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; cursor: pointer; }
  .ost-progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }
  .ost-time-info { display: flex; justify-content: space-between; font-size: 12px; color: #666; }
  .album-art-placeholder { width: calc(100% - 40px); margin: 0 20px 24px; aspect-ratio: 1/1; border-radius: 12px; background: #111; border: 0.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; color: #333; font-size: 13px; }
  .player-default { margin: 0 20px 24px; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 16/9; border: 0.5px solid #1a1a1a; }
  .player-default-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #333; font-size: 13px; }
  .ost-player { width: calc(100% - 40px); margin: 0 20px 24px; }
  .ost-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
  .ost-controls img { width: 32px; height: 32px; cursor: pointer; opacity: 0.8; transition: opacity 0.15s; }
  .ost-controls img:active { opacity: 0.5; }
  .ost-controls img.play-pause { width: 40px; height: 40px; }
  .ost-timebar { width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 16px; position: relative; cursor: pointer; }
  .ost-timebar-progress { height: 100%; background: #fff; border-radius: 2px; width: 0%; transition: width 0.1s linear; }
  .ost-timeinfo { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; color: #666; }
  #ost-iframe-container { position: absolute; left: -9999px; }
  .ep-play.has-video svg { fill: #fff; }
  .ep-card.locked { opacity: 0.4; cursor: not-allowed; }
  .ep-play.locked-icon { border-color: #333; }
  .ep-play.has-video svg { fill: #fff; }
  .no-video { color: #333; font-size: 12px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-placeholder">Chargement...</div>
  <div class="header-gradient"></div>
  <div class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>
</div>

<div class="info" id="info"></div>

<div id="player-wrap"></div>

<div class="section-title" id="section-label">Épisodes</div>
<div class="episodes" id="episodes">
  <div class="no-video">Chargement...</div>
</div>

<script>
  const API = 'https://cynbom-backend-production.up.railway.app';
  const params = new URLSearchParams(window.location.search);
  const titre = decodeURIComponent(params.get('titre') || '');
  let activeEp = null;

  function getYouTubeId(url) {
    if (!url) return null;
    const short = url.match(/youtu\.be\/([^?&]+)/);
    if (short) return short[1];
    const match = url.match(/[?&]v=([^&]+)/);
    return match ? match[1] : null;
  }

  function jouerVideo(url, epCard, albumImg) {
    document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active-ep'));
    epCard.classList.add('active-ep');

    // OST mode — juste highlight la musique, l'image reste
    if (albumImg) {
      document.getElementById('album-img').scrollIntoView({ behavior: 'smooth' });
      return;
    }

    // Mode vidéo normal
    const videoId = getYouTubeId(url);
    if (!videoId) return;
    document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1" allowfullscreen style="width:100%;height:100%;border:none;display:block;"></iframe>`;
    document.getElementById('player').scrollIntoView({ behavior: 'smooth' });
  }

  async function charger() {
    try {
      // Charger infos série
      const resSeries = await fetch(`${API}/series`);
      const series = await resSeries.json();
      const serie = series.find(s => s.titre === titre);

      if (!serie) {
        document.getElementById('info').innerHTML = '<div style="padding:20px;color:#555">Série introuvable.</div>';
        return;
      }

      document.title = `${serie.titre} — Cynbom`;

      // Header image
      const header = document.getElementById('header');
      if (serie.image) {
        header.innerHTML = `
          <img class="header-img" src="${serie.image}" alt="${serie.titre}">
          <div class="header-gradient"></div>
          <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </div>`;
      } else {
        header.innerHTML = `
          <div class="header-placeholder">${serie.titre}</div>
          <div class="header-gradient"></div>
          <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </div>`;
      }

      // Infos
      document.getElementById('info').innerHTML = `
        <div class="serie-title">${serie.titre}</div>
        <div class="serie-tags">
          ${serie.studio ? `<span class="tag">${serie.studio}</span>` : ''}
          ${serie.annee ? `<span class="tag">${serie.annee}</span>` : ''}
          ${serie.age ? `<span class="tag age">${serie.age}</span>` : ''}
          ${serie.genre ? `<span class="tag">${serie.genre}</span>` : ''}
        </div>`;

      // Détecter OST
      const isOST = (serie.genre || '').toLowerCase().includes('ost');
      document.getElementById('section-label').textContent = isOST ? 'Musiques' : 'Épisodes';

      // Init player/album art
      const playerWrap = document.getElementById('player-wrap');
      if (isOST) {
        playerWrap.innerHTML = `
          <div class="ost-player">
            ${serie.image ? `<img class="ost-cover" src="${serie.image}" alt="${serie.titre}">` : '<div class="ost-cover-placeholder">Pochette non disponible</div>'}
            <div class="ost-controls">
              <button class="ost-btn" id="ost-prev"><img src="https://i.postimg.cc/8cPFx7hb/Previous.png" alt="Précédent"></button>
              <button class="ost-btn" id="ost-play"><img src="https://i.postimg.cc/0j26hzpZ/Play.png" alt="Play" id="play-icon"></button>
              <button class="ost-btn" id="ost-next"><img src="https://i.postimg.cc/sxDBbMpm/Next.png" alt="Suivant"></button>
            </div>
            <div class="ost-progress-wrap">
              <div class="ost-progress-bar">
                <div class="ost-progress-fill" id="ost-progress"></div>
              </div>
            </div>
            <div class="ost-time-info">
              <span id="ost-time">0:00 / 0:00</span>
              <span id="ost-track">0 / 0</span>
            </div>
            <iframe id="ost-iframe" style="display:none;width:100%;height:200px;" frameborder="0" allow="autoplay"></iframe>
          </div>
        `;
      } else {
        playerWrap.innerHTML = `<div class="player-default" id="player"><div class="player-default-placeholder"><svg viewBox="0 0 24 24" style="width:32px;height:32px;stroke:#333;fill:none;stroke-width:1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#333" stroke="none"/></svg>Sélectionnez un épisode</div></div>`;
      }

      // Charger épisodes
      const resEp = await fetch(`${API}/series/${encodeURIComponent(titre)}/episodes`);
      const episodes = await resEp.json();
      const epContainer = document.getElementById('episodes');

      if (episodes.length === 0) {
        epContainer.innerHTML = '<div class="no-video">Aucun épisode pour le moment.</div>';
        return;
      }

      // Grouper par saison
      const saisons = {};
      episodes.forEach(ep => {
        if (!saisons[ep.saison]) saisons[ep.saison] = [];
        saisons[ep.saison].push(ep);
      });

      // Détecter si arrive bientôt
      const titreLower = titre.toLowerCase();
      const arriveBientot = titreLower.includes('(arrive bientôt)') || titreLower.includes('(arrive bientot)') || /\(arrive le \d{2}\/\d{2}\/\d{4}\)/.test(titreLower);

      // Trier : si arriveBientot → Trailer en haut, sinon Trailer en bas
      const saisonKeys = Object.keys(saisons).sort((a, b) => {
        const aIsTrailer = a.toLowerCase() === 'trailer';
        const bIsTrailer = b.toLowerCase() === 'trailer';
        if (arriveBientot) {
          if (aIsTrailer) return -1;
          if (bIsTrailer) return 1;
        } else {
          if (aIsTrailer) return 1;
          if (bIsTrailer) return -1;
        }
        return isNaN(a) || isNaN(b) ? a.localeCompare(b) : Number(a) - Number(b);
      });

      if (isOST) { ostEpisodes = episodes; alert('OST détecté, ' + episodes.length + ' musiques chargées'); }
      epContainer.innerHTML = saisonKeys.map(saison => {
        const eps = saisons[saison];
        const isTrailer = saison.toLowerCase() === 'trailer';
        const locked = arriveBientot && !isTrailer;
        const saisonLabel = isNaN(saison) ? saison : `Saison ${saison}`;
        return `
          <div class="saison-label">${saisonLabel}</div>
          ${eps.map(ep => `
            <div class="ep-card ${locked ? 'locked' : ''}" id="ep-${ep.saison}-${ep.numero}" onclick="${locked ? '' : `handleEp(this, '${ep.video || ''}', '${isOST}')`}">
              <div class="ep-num">${ep.numero}</div>
              <div class="ep-info">
                <div class="ep-title">${ep.titre || `Épisode ${ep.numero}`}</div>
                <div class="ep-meta">${isNaN(saison) ? saison : `S${ep.saison}`} · E${ep.numero}</div>
              </div>
              <div class="ep-play ${locked ? 'locked-icon' : (ep.video ? 'has-video' : '')}">
                ${locked ? '<svg viewBox="0 0 24 24" style="fill:#333;stroke:none"><path d="M18 11H16V7C16 4.79 14.21 3 12 3S8 4.79 8 7V11H6C4.9 11 4 11.9 4 13V21C4 22.1 4.9 23 6 23H18C19.1 23 20 22.1 20 21V13C20 11.9 19.1 11 18 11ZM12 18C10.9 18 10 17.1 10 16S10.9 14 12 14 14 14.9 14 16 13.1 18 12 18ZM14 11H10V7C10 5.9 10.9 5 12 5S14 5.9 14 7V11Z"/></svg>' : '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
              </div>
            </div>
          `).join('')}`;
      }).join('');

    } catch (e) {
      document.getElementById('episodes').innerHTML = '<div class="no-video">Erreur de connexion.</div>';
    }
  }

  function handleEp(card, video, ost) {
    if (ost === 'true') {
      const index = Array.from(card.parentElement.children).indexOf(card);
      loadOSTTrack(index);
    } else if (video) {
      jouerVideo(video, card, false);
    }
  }

  charger();

  // OST Player
  let ostPlayer = null;
  let ostCurrentIndex = -1;
  let ostEpisodes = [];
  let ostUpdateInterval = null;

  function onYouTubeIframeAPIReady() {
    console.log('YouTube API ready');
  }

  function ostLoadTrack(index) {
    if (index < 0 || index >= ostEpisodes.length) return;
    ostCurrentIndex = index;
    const ep = ostEpisodes[index];
    const videoId = getYouTubeId(ep.video);
    if (!videoId) { console.error('Invalid video ID'); return; }

    document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active-ep'));
    document.getElementById(`ep-${ep.saison}-${ep.numero}`)?.classList.add('active-ep');
    document.getElementById('ost-track').textContent = `${index + 1} / ${ostEpisodes.length}`;

    if (ostPlayer) {
      ostPlayer.loadVideoById(videoId);
      ostPlayer.playVideo();
    } else {
      const container = document.getElementById('ost-iframe-container');
      container.innerHTML = '<div id="ost-yt-player"></div>';
      
      ostPlayer = new YT.Player('ost-yt-player', {
        height: '1',
        width: '1',
        videoId: videoId,
        playerVars: { autoplay: 1, controls: 0 },
        events: {
          onReady: (e) => { 
            e.target.playVideo();
            if (ostUpdateInterval) clearInterval(ostUpdateInterval);
            ostUpdateInterval = setInterval(ostUpdateTime, 500);
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              document.getElementById('ost-play-btn').src = 'https://i.postimg.cc/T1YyBKrJ/Pause.png';
            } else if (e.data === YT.PlayerState.PAUSED) {
              document.getElementById('ost-play-btn').src = 'https://i.postimg.cc/0j26hzpZ/Play.png';
            } else if (e.data === YT.PlayerState.ENDED) {
              ostNext();
            }
          }
        }
      });
    }
  }

  function ostTogglePlay() {
    if (!ostPlayer) return;
    const state = ostPlayer.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      ostPlayer.pauseVideo();
    } else {
      ostPlayer.playVideo();
    }
  }

  function ostPrevious() {
    if (ostCurrentIndex > 0) ostLoadTrack(ostCurrentIndex - 1);
  }

  function ostNext() {
    if (ostCurrentIndex < ostEpisodes.length - 1) ostLoadTrack(ostCurrentIndex + 1);
  }

  function ostSeek(e) {
    if (!ostPlayer) return;
    const bar = e.currentTarget;
    const percent = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
    const duration = ostPlayer.getDuration();
    ostPlayer.seekTo(percent * duration, true);
  }

  function ostUpdateTime() {
    if (!ostPlayer || !ostPlayer.getCurrentTime) return;
    try {
      const current = Math.floor(ostPlayer.getCurrentTime() || 0);
      const duration = Math.floor(ostPlayer.getDuration() || 0);
      const currentMin = Math.floor(current / 60);
      const currentSec = (current % 60).toString().padStart(2, '0');
      const durationMin = Math.floor(duration / 60);
      const durationSec = (duration % 60).toString().padStart(2, '0');
      document.getElementById('ost-time').textContent = `${currentMin}:${currentSec} / ${durationMin}:${durationSec}`;
      document.getElementById('ost-progress').style.width = duration > 0 ? ((current / duration) * 100) + '%' : '0%';
    } catch(e) { console.error('Update time error:', e); }
  }

</script>
</body>
</html>
