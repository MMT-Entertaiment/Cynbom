<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Série - Cynbom</title>
<script src="https://www.youtube.com/iframe_api"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; max-width: 400px; margin: 0 auto; }

.header { position: relative; }
.header-img { width: 100%; height: 260px; object-fit: cover; display: block; }
.header-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to bottom, transparent, #000); }
.back-btn { position: absolute; top: 20px; left: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 0.5px solid #333; }
.back-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }

.info { padding: 16px 20px 0; }
.serie-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.serie-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tag { font-size: 11px; color: #888; background: #111; border: 0.5px solid #222; padding: 3px 8px; border-radius: 4px; }

.video-player { margin: 0 20px 24px; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 16/9; border: 0.5px solid #1a1a1a; }
.video-player iframe { width: 100%; height: 100%; border: none; display: block; }
.video-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #333; font-size: 13px; }

.ost-player { margin: 0 20px 24px; }
.ost-cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; display: block; margin-bottom: 16px; }
.ost-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 16px; }
.ost-btn { cursor: pointer; }
.ost-btn img { width: 32px; height: 32px; opacity: 0.7; transition: opacity 0.2s; }
.ost-btn.play img { width: 40px; height: 40px; }
.ost-btn:active img { opacity: 1; }
.ost-progress-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; cursor: pointer; margin-bottom: 12px; position: relative; }
.ost-progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; }
.ost-time-info { display: flex; justify-content: space-between; font-size: 12px; color: #666; }
.ost-youtube-hidden { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

.section-title { font-size: 14px; font-weight: 500; padding: 0 20px; margin-bottom: 12px; }
.episodes { padding: 0 20px 40px; }
.saison-label { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 1px; text-transform: uppercase; margin: 16px 0 8px; }
.ep-card { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; }
.ep-card:active { opacity: 0.6; }
.ep-card.active { background: rgba(255,255,255,0.05); }
.ep-card.locked { opacity: 0.4; cursor: not-allowed; }
.ep-num { font-size: 13px; font-weight: 600; color: #444; width: 28px; text-align: center; }
.ep-card.active .ep-num { color: #fff; }
.ep-info { flex: 1; }
.ep-title { font-size: 13px; font-weight: 500; }
.ep-meta { font-size: 11px; color: #555; margin-top: 2px; }
.ep-play { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid #333; display: flex; align-items: center; justify-content: center; }
.ep-play svg { width: 12px; height: 12px; fill: #888; }
.ep-play.has-video { border-color: #fff; }
.ep-play.has-video svg { fill: #fff; }
.ep-play.locked svg { fill: #333; }
</style>
</head>
<body>

<div class="header" id="header"></div>
<div class="info" id="info"></div>
<div id="player-container"></div>
<div class="section-title" id="section-title">Épisodes</div>
<div class="episodes" id="episodes"></div>

<script>
const API = 'https://cynbom-backend-production.up.railway.app';
const params = new URLSearchParams(window.location.search);
const urlId = params.get('ID');
const titre = params.get('titre'); // fallback legacy

let isOST = false;
let ostPlayer = null;
let ostEpisodes = [];
let ostCurrentIndex = -1;
let ostUpdateInterval = null;

function getYouTubeId(url) {
  if (!url) return null;
  const patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?]+)/, /youtube\.com\/embed\/([^?]+)/];
  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match) return match[1];
  }
  return null;
}

function playVideo(videoUrl) {
  const videoId = getYouTubeId(videoUrl);
  if (!videoId) return;
  document.getElementById('player-container').innerHTML = `<div class="video-player"><iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1" allowfullscreen allow="autoplay"></iframe></div>`;
  document.getElementById('player-container').scrollIntoView({ behavior: 'smooth' });
}

function loadOSTTrack(index) {
  if (index < 0 || index >= ostEpisodes.length) return;
  ostCurrentIndex = index;
  const track = ostEpisodes[index];
  const videoId = getYouTubeId(track.video);
  if (!videoId) return;
  document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
  document.getElementById(`ep-${track.saison}-${track.numero}`)?.classList.add('active');
  document.getElementById('ost-track-count').textContent = `${index + 1} / ${ostEpisodes.length}`;
  if (ostPlayer && typeof ostPlayer.loadVideoById === 'function') {
    ostPlayer.loadVideoById(videoId);
  } else {
    const ytContainer = document.getElementById('ost-youtube-container');
    ytContainer.innerHTML = '<div id="ost-yt-player"></div>';
    ostPlayer = new YT.Player('ost-yt-player', {
      height: '1', width: '1', videoId: videoId, playerVars: { autoplay: 1, controls: 0, modestbranding: 1 },
      events: {
        onReady: (e) => { e.target.playVideo(); startOSTUpdater(); },
        onStateChange: (e) => {
          const playBtn = document.getElementById('ost-play-btn');
          if (e.data === YT.PlayerState.PLAYING) playBtn.src = 'https://i.postimg.cc/T1YyBKrJ/Pause.png';
          else if (e.data === YT.PlayerState.PAUSED) playBtn.src = 'https://i.postimg.cc/0j26hzpZ/Play.png';
          else if (e.data === YT.PlayerState.ENDED) ostNext();
        }
      }
    });
  }
}

function ostTogglePlay() { if (!ostPlayer) return; ostPlayer.getPlayerState() === YT.PlayerState.PLAYING ? ostPlayer.pauseVideo() : ostPlayer.playVideo(); }
function ostPrevious() { if (ostCurrentIndex > 0) loadOSTTrack(ostCurrentIndex - 1); }
function ostNext() { if (ostCurrentIndex < ostEpisodes.length - 1) loadOSTTrack(ostCurrentIndex + 1); }
function ostSeek(e) {
  if (!ostPlayer) return;
  const bar = e.currentTarget;
  const percent = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
  ostPlayer.seekTo(percent * ostPlayer.getDuration(), true);
}

function startOSTUpdater() {
  if (ostUpdateInterval) clearInterval(ostUpdateInterval);
  ostUpdateInterval = setInterval(() => {
    if (!ostPlayer || typeof ostPlayer.getCurrentTime !== 'function') return;
    try {
      const current = Math.floor(ostPlayer.getCurrentTime());
      const duration = Math.floor(ostPlayer.getDuration());
      const cMin = Math.floor(current / 60), cSec = String(current % 60).padStart(2, '0');
      const dMin = Math.floor(duration / 60), dSec = String(duration % 60).padStart(2, '0');
      document.getElementById('ost-time').textContent = `${cMin}:${cSec} / ${dMin}:${dSec}`;
      document.getElementById('ost-progress-fill').style.width = duration > 0 ? `${(current / duration) * 100}%` : '0%';
    } catch(e) {}
  }, 500);
}

async function init() {
  if (!titre) { document.getElementById('info').innerHTML = '<p style="padding:40px 20px;text-align:center;color:#333;">Série introuvable</p>'; return; }
  try {
    let serie;
    if (urlId) {
      const serieRes = await fetch(`${API}/serie/${urlId}`);
      if (!serieRes.ok) { document.getElementById('info').innerHTML = '<p style="padding:40px 20px;text-align:center;color:#333;">Série introuvable</p>'; return; }
      serie = await serieRes.json();
    } else if (titre) {
      // Legacy fallback
      const seriesRes = await fetch(`${API}/series`);
      const allSeries = await seriesRes.json();
      serie = allSeries.find(s => s.titre === titre);
    }
    if (!serie) { document.getElementById('info').innerHTML = '<p style="padding:40px 20px;text-align:center;color:#333;">Série introuvable</p>'; return; }

    isOST = (serie.genre || '').toLowerCase().includes('ost');
    const arriveBientot = /\(arrive\s+(bientôt|bientot|le\s+\d{2}\/\d{2}\/\d{4})\)/i.test(serie.titre);

    const headerHTML = serie.image ? `<img class="header-img" src="${serie.image}"><div class="header-gradient"></div>` : `<div style="height:260px;background:#111;"></div>`;
    document.getElementById('header').innerHTML = headerHTML + '<div class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>';

    document.getElementById('info').innerHTML = `<div class="serie-title">${serie.titre}</div><div class="serie-tags">${serie.studio ? `<span class="tag">${serie.studio}</span>` : ''}${serie.annee ? `<span class="tag">${serie.annee}</span>` : ''}${serie.age ? `<span class="tag">${serie.age}</span>` : ''}${serie.genre ? `<span class="tag">${serie.genre}</span>` : ''}</div>`;

    const playerContainer = document.getElementById('player-container');
    if (isOST) {
      document.getElementById('section-title').textContent = 'Musiques';
      const coverHTML = serie.image ? `<img class="ost-cover" src="${serie.image}">` : `<div class="ost-cover" style="background:#111;display:flex;align-items:center;justify-content:center;color:#333;">Pochette</div>`;
      playerContainer.innerHTML = `<div class="ost-player">${coverHTML}<div class="ost-controls"><div class="ost-btn" onclick="ostPrevious()"><img src="https://i.postimg.cc/8cPFx7hb/Previous.png"></div><div class="ost-btn play"><img id="ost-play-btn" src="https://i.postimg.cc/0j26hzpZ/Play.png" onclick="ostTogglePlay()"></div><div class="ost-btn" onclick="ostNext()"><img src="https://i.postimg.cc/sxDBbMpm/Next.png"></div></div><div class="ost-progress-bar" onclick="ostSeek(event)"><div class="ost-progress-fill" id="ost-progress-fill"></div></div><div class="ost-time-info"><span id="ost-time">0:00 / 0:00</span><span id="ost-track-count">-</span></div></div><div class="ost-youtube-hidden" id="ost-youtube-container"></div>`;
    } else {
      playerContainer.innerHTML = `<div class="video-player"><div class="video-placeholder"><svg viewBox="0 0 24 24" style="width:32px;height:32px;stroke:#333;fill:none;stroke-width:1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="#333" stroke="none"/></svg>Sélectionnez un épisode</div></div>`;
    }

    const episodesRes = await fetch(`${API}/series/${encodeURIComponent(serie.titre)}/episodes`);
    const episodes = await episodesRes.json();
    if (isOST) ostEpisodes = episodes;

    const seasons = {};
    episodes.forEach(ep => { const s = ep.saison || '1'; if (!seasons[s]) seasons[s] = []; seasons[s].push(ep); });

    const seasonKeys = Object.keys(seasons).sort((a, b) => {
      const aTrailer = a.toLowerCase() === 'trailer', bTrailer = b.toLowerCase() === 'trailer';
      if (arriveBientot) { if (aTrailer) return -1; if (bTrailer) return 1; } else { if (aTrailer) return 1; if (bTrailer) return -1; }
      if (isNaN(a) || isNaN(b)) return a.localeCompare(b);
      return Number(a) - Number(b);
    });

    let episodesHTML = '';
    seasonKeys.forEach(season => {
      const eps = seasons[season];
      const isTrailer = season.toLowerCase() === 'trailer';
      const locked = arriveBientot && !isTrailer;
      const sLabel = isNaN(season) ? season : `Saison ${season}`;
      episodesHTML += `<div class="saison-label">${sLabel}</div>`;
      eps.forEach(ep => {
        const playIcon = locked ? '<svg viewBox="0 0 24 24" style="fill:#333"><path d="M18 11H16V7C16 4.79 14.21 3 12 3S8 4.79 8 7V11H6C4.9 11 4 11.9 4 13V21C4 22.1 4.9 23 6 23H18C19.1 23 20 22.1 20 21V13C20 11.9 19.1 11 18 11ZM12 18C10.9 18 10 17.1 10 16S10.9 14 12 14 14 14.9 14 16 13.1 18 12 18ZM14 11H10V7C10 5.9 10.9 5 12 5S14 5.9 14 7V11Z"/></svg>' : '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        const onClick = locked ? '' : (isOST ? `onclick="loadOSTTrack(${ostEpisodes.indexOf(ep)})"` : `onclick="playVideo('${ep.video}');this.parentElement.querySelectorAll('.ep-card').forEach(c=>c.classList.remove('active'));this.classList.add('active')"`);
        episodesHTML += `<div class="ep-card${locked ? ' locked' : ''}" id="ep-${ep.saison}-${ep.numero}" ${onClick}><div class="ep-num">${ep.numero}</div><div class="ep-info"><div class="ep-title">${ep.titre || `Épisode ${ep.numero}`}</div><div class="ep-meta">${isNaN(season) ? season : `S${ep.saison}`} · E${ep.numero}</div></div><div class="ep-play${ep.video && !locked ? ' has-video' : ''}${locked ? ' locked' : ''}">${playIcon}</div></div>`;
      });
    });
    document.getElementById('episodes').innerHTML = episodesHTML;
  } catch(e) { console.error(e); document.getElementById('info').innerHTML = '<p style="padding:40px 20px;text-align:center;color:#333;">Erreur de chargement</p>'; }
}
init();
</script>
</body>
</html>
