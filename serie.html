<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Série - Cynbom</title>
<script src="https://www.youtube.com/iframe_api"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; max-width: 400px; margin: 0 auto; }

.header { position: relative; }
.header-img { width: 100%; height: 260px; object-fit: cover; display: block; }
.header-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to bottom, transparent, #000); }
.back-btn { position: absolute; top: 20px; left: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 0.5px solid #333; }
.back-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }

.info { padding: 16px 20px 0; }
.serie-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.serie-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tag { font-size: 11px; color: #888; background: #111; border: 0.5px solid #222; padding: 3px 8px; border-radius: 4px; }

/* Player normal */
.player { margin: 0 20px 24px; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 16/9; border: 0.5px solid #1a1a1a; }
.player iframe { width: 100%; height: 100%; border: none; display: block; }
.player-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #333; font-size: 13px; }

/* OST Player */
.ost-wrap { margin: 0 20px 24px; }
.ost-cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; display: block; margin-bottom: 16px; }
.ost-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 16px; }
.ost-btn img { width: 32px; height: 32px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
.ost-btn img:active { opacity: 1; }
.ost-btn.play img { width: 40px; height: 40px; }
.ost-progress { width: 100%; height: 4px; background: #222; border-radius: 2px; cursor: pointer; margin-bottom: 12px; }
.ost-progress-fill { height: 100%; background: #fff; width: 0%; }
.ost-time { display: flex; justify-content: space-between; font-size: 12px; color: #666; }

.section-title { font-size: 14px; font-weight: 500; padding: 0 20px; margin-bottom: 12px; }
.episodes { padding: 0 20px 40px; }
.saison-label { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 1px; text-transform: uppercase; margin: 16px 0 8px; }
.ep-card { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; }
.ep-card:active { opacity: 0.6; }
.ep-card.active-ep .ep-num { color: #fff; }
.ep-num { font-size: 13px; font-weight: 600; color: #444; width: 28px; text-align: center; }
.ep-info { flex: 1; }
.ep-title { font-size: 13px; font-weight: 500; }
.ep-meta { font-size: 11px; color: #555; margin-top: 2px; }
.ep-play { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid #333; display: flex; align-items: center; justify-content: center; }
.ep-play svg { width: 12px; height: 12px; fill: #888; }
.ep-play.has-video { border-color: #fff; }
.ep-play.has-video svg { fill: #fff; }
.ep-card.locked { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header" id="header"></div>
<div class="info" id="info"></div>
<div id="player-wrap"></div>
<div class="section-title" id="section-label">Épisodes</div>
<div class="episodes" id="episodes"></div>

<script>
const API = 'https://cynbom-backend-production.up.railway.app';
const titre = new URLSearchParams(window.location.search).get('titre');
let ostPlayer, ostEpisodes = [], ostIndex = -1, ostInterval;

function getYouTubeId(url) {
  if (!url) return null;
  const shortMatch = url.match(/youtu\.be\/([^?]+)/);
  if (shortMatch) return shortMatch[1];
  const longMatch = url.match(/[?&]v=([^&]+)/);
  return longMatch ? longMatch[1] : null;
}

async function init() {
  try {
    const res = await fetch(`${API}/series`);
    const series = await res.json();
    const serie = series.find(s => s.titre === titre);
    if (!serie) { document.getElementById('info').innerHTML = '<p style="text-align:center;color:#333;padding:40px 20px;">Série introuvable</p>'; return; }

    const isOST = (serie.genre || '').toLowerCase().includes('ost');
    const arriveBientot = /\(arrive\s+(bientôt|bientot|le\s+\d{2}\/\d{2}\/\d{4})\)/i.test(serie.titre);

    // Header
    document.getElementById('header').innerHTML = serie.image 
      ? `<img class="header-img" src="${serie.image}"><div class="header-gradient"></div><div class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
      : `<div class="header-placeholder" style="height:260px;background:#111;display:flex;align-items:center;justify-content:center;color:#333;">${serie.titre}</div><div class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;

    // Info
    document.getElementById('info').innerHTML = `
      <div class="serie-title">${serie.titre}</div>
      <div class="serie-tags">
        ${serie.studio ? `<span class="tag">${serie.studio}</span>` : ''}
        ${serie.annee ? `<span class="tag">${serie.annee}</span>` : ''}
        ${serie.age ? `<span class="tag">${serie.age}</span>` : ''}
        ${serie.genre ? `<span class="tag">${serie.genre}</span>` : ''}
      </div>`;

    // Player
    document.getElementById('section-label').textContent = isOST ? 'Musiques' : 'Épisodes';
    const playerWrap = document.getElementById('player-wrap');
    if (isOST) {
      playerWrap.innerHTML = `<div class="ost-wrap">
        ${serie.image ? `<img class="ost-cover" src="${serie.image}">` : ''}
        <div class="ost-controls">
          <div class="ost-btn" onclick="ostPrev()"><img src="https://i.postimg.cc/8cPFx7hb/Previous.png"></div>
          <div class="ost-btn play" onclick="ostToggle()"><img id="ost-play-btn" src="https://i.postimg.cc/0j26hzpZ/Play.png"></div>
          <div class="ost-btn" onclick="ostNext()"><img src="https://i.postimg.cc/sxDBbMpm/Next.png"></div>
        </div>
        <div class="ost-progress" onclick="ostSeek(event)"><div class="ost-progress-fill" id="ost-fill"></div></div>
        <div class="ost-time"><span id="ost-time">0:00 / 0:00</span><span id="ost-track">-</span></div>
      </div><div id="ost-container"></div>`;
    } else {
      playerWrap.innerHTML = `<div class="player" id="player"><div class="player-placeholder">Sélectionnez un épisode</div></div>`;
    }

    // Episodes
    const resEp = await fetch(`${API}/series/${encodeURIComponent(titre)}/episodes`);
    const episodes = await resEp.json();
    if (isOST) ostEpisodes = episodes;

    const saisons = {};
    episodes.forEach(ep => {
      if (!saisons[ep.saison]) saisons[ep.saison] = [];
      saisons[ep.saison].push(ep);
    });

    const saisonKeys = Object.keys(saisons).sort((a, b) => {
      const aT = a.toLowerCase() === 'trailer';
      const bT = b.toLowerCase() === 'trailer';
      if (arriveBientot) return aT ? -1 : bT ? 1 : (isNaN(a) ? a.localeCompare(b) : Number(a) - Number(b));
      return aT ? 1 : bT ? -1 : (isNaN(a) ? a.localeCompare(b) : Number(a) - Number(b));
    });

    let html = '';
    saisonKeys.forEach(saison => {
      const isTrailer = saison.toLowerCase() === 'trailer';
      const locked = arriveBientot && !isTrailer;
      html += `<div class="saison-label">${isNaN(saison) ? saison : `Saison ${saison}`}</div>`;
      saisons[saison].forEach(ep => {
        const idx = isOST ? ostEpisodes.findIndex(e => e.saison === ep.saison && e.numero === ep.numero) : -1;
        html += `<div class="ep-card ${locked ? 'locked' : ''}" id="ep-${ep.saison}-${ep.numero}" ${locked ? '' : `onclick="${isOST ? `ostLoad(${idx})` : `playVideo('${ep.video || ''}')`}"`}>
          <div class="ep-num">${ep.numero}</div>
          <div class="ep-info">
            <div class="ep-title">${ep.titre || `Épisode ${ep.numero}`}</div>
            <div class="ep-meta">${isNaN(saison) ? saison : 'S' + ep.saison} · E${ep.numero}</div>
          </div>
          <div class="ep-play ${ep.video ? 'has-video' : ''}">
            ${locked ? '<svg viewBox="0 0 24 24"><path d="M18 11H16V7C16 4.79 14.21 3 12 3S8 4.79 8 7V11H6C4.9 11 4 11.9 4 13V21C4 22.1 4.9 23 6 23H18C19.1 23 20 22.1 20 21V13C20 11.9 19.1 11 18 11ZM12 18C10.9 18 10 17.1 10 16S10.9 14 12 14 14 14.9 14 16 13.1 18 12 18ZM14 11H10V7C10 5.9 10.9 5 12 5S14 5.9 14 7V11Z" fill="#333"/></svg>' : '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
          </div>
        </div>`;
      });
    });
    document.getElementById('episodes').innerHTML = html || '<p style="text-align:center;color:#333;padding:20px;">Aucun épisode</p>';

  } catch (e) {
    document.getElementById('info').innerHTML = '<p style="text-align:center;color:#f33;padding:40px 20px;">Erreur de chargement</p>';
  }
}

function playVideo(url) {
  const id = getYouTubeId(url);
  if (!id) return;
  document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active-ep'));
  event.target.closest('.ep-card').classList.add('active-ep');
  document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?rel=0" allow="autoplay" allowfullscreen></iframe>`;
}

// OST Functions
function ostLoad(idx) {
  if (idx < 0 || idx >= ostEpisodes.length) return;
  ostIndex = idx;
  const ep = ostEpisodes[idx];
  const id = getYouTubeId(ep.video);
  if (!id) return;

  if (ostPlayer) {
    ostPlayer.loadVideoById(id);
  } else {
    document.getElementById('ost-container').innerHTML = '<div id="ost-yt"></div>';
    ostPlayer = new YT.Player('ost-yt', {
      height: '1', width: '1',
      videoId: id,
      playerVars: { autoplay: 1 },
      events: {
        onReady: () => { ostUpdate(); if (ostInterval) clearInterval(ostInterval); ostInterval = setInterval(ostUpdate, 500); },
        onStateChange: e => {
          document.getElementById('ost-play-btn').src = e.data === 1 ? 'https://i.postimg.cc/T1YyBKrJ/Pause.png' : 'https://i.postimg.cc/0j26hzpZ/Play.png';
          if (e.data === 0) ostNext();
        }
      }
    });
  }

  document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active-ep'));
  document.getElementById(`ep-${ep.saison}-${ep.numero}`)?.classList.add('active-ep');
  document.getElementById('ost-track').textContent = `${idx + 1} / ${ostEpisodes.length}`;
}

function ostToggle() { if (ostPlayer) ostPlayer.getPlayerState() === 1 ? ostPlayer.pauseVideo() : ostPlayer.playVideo(); }
function ostPrev() { if (ostIndex > 0) ostLoad(ostIndex - 1); }
function ostNext() { if (ostIndex < ostEpisodes.length - 1) ostLoad(ostIndex + 1); }
function ostSeek(e) { if (ostPlayer) { const pct = (e.clientX - e.target.getBoundingClientRect().left) / e.target.offsetWidth; ostPlayer.seekTo(pct * ostPlayer.getDuration(), true); }}
function ostUpdate() {
  if (!ostPlayer || typeof ostPlayer.getCurrentTime !== 'function') return;
  try {
    const cur = Math.floor(ostPlayer.getCurrentTime()), dur = Math.floor(ostPlayer.getDuration());
    document.getElementById('ost-time').textContent = `${Math.floor(cur/60)}:${(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
    document.getElementById('ost-fill').style.width = dur > 0 ? ((cur/dur)*100) + '%' : '0%';
  } catch {}
}

init();
</script>
</body>
</html>
