<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cynbom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; max-width: 400px; margin: 0 auto; min-height: 100vh; }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 12px; position: sticky; top: 0; background: #000; z-index: 50; border-bottom: 0.5px solid #111; }
.topbar img.logo { height: 40px; object-fit: contain; }

/* PAGES */
.page { display: none; padding: 0 0 160px; }
.page.active { display: block; }

/* EN VEDETTE */
.vedette-section { position: relative; cursor: pointer; }
.vedette-img { width: 100%; height: 220px; object-fit: cover; display: block; }
.vedette-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 140px; background: linear-gradient(to bottom, transparent, #000); }
.vedette-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px; }
.vedette-title { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
.vedette-actions { display: flex; gap: 8px; }
.btn-regarder { display: flex; align-items: center; gap: 6px; background: #fff; color: #000; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-savoir { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* SECTIONS */
.section { margin-bottom: 24px; padding-top: 8px; }
.section-title { font-size: 14px; font-weight: 600; padding: 0 20px; margin-bottom: 12px; }
.row { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 4px; scrollbar-width: none; }
.row::-webkit-scrollbar { display: none; }
.vignette { flex-shrink: 0; width: 100px; cursor: pointer; }
.vignette img { width: 100px; height: 145px; border-radius: 8px; object-fit: cover; display: block; background: #111; }
.vignette-placeholder { width: 100px; height: 145px; border-radius: 8px; background: #111; border: 0.5px solid #1c1c1c; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #333; text-align: center; padding: 6px; line-height: 1.3; }
.vignette-title { font-size: 11px; font-weight: 500; color: #aaa; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ARRIVE BIENTOT */
.bientot-card { flex-shrink: 0; width: 140px; cursor: pointer; }
.bientot-img { width: 140px; height: 80px; border-radius: 8px; object-fit: cover; display: block; background: #111; }
.bientot-placeholder { width: 140px; height: 80px; border-radius: 8px; background: #111; border: 0.5px solid #1c1c1c; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #333; text-align: center; padding: 6px; }
.bientot-title { font-size: 11px; font-weight: 500; color: #aaa; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bientot-date { font-size: 10px; color: #555; margin-top: 2px; }

.empty { text-align: center; color: #333; font-size: 14px; padding: 60px 0; }

/* RECHERCHE */
.search-wrap { padding: 12px 20px 16px; position: sticky; top: 65px; background: #000; z-index: 10; }
.search-input { width: 100%; background: #111; border: 0.5px solid #222; border-radius: 10px; padding: 12px 16px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.search-input::placeholder { color: #444; }
.search-results { padding: 0 20px; }
.no-results { text-align: center; color: #333; font-size: 14px; padding: 40px 0; }
.serie-card { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; }
.serie-thumb { width: 90px; height: 130px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #111; }
.serie-thumb-placeholder { width: 90px; height: 130px; border-radius: 8px; flex-shrink: 0; background: #111; border: 0.5px solid #1c1c1c; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #333; text-align: center; padding: 8px; line-height: 1.4; }
.serie-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.serie-title-text { font-size: 15px; font-weight: 600; }
.serie-studio { font-size: 12px; color: #555; }
.serie-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.tag { font-size: 11px; color: #888; background: #111; border: 0.5px solid #222; padding: 3px 8px; border-radius: 4px; }
.tag.age { color: #fff; border-color: #333; background: #1a1a1a; }

/* SETTINGS */
.settings-title { font-size: 22px; font-weight: 600; padding: 20px 20px 16px; }
.settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; }
.settings-item:active { opacity: 0.6; }
.settings-label { font-size: 14px; font-weight: 500; }
.settings-icon { width: 20px; height: 20px; object-fit: contain; opacity: 0.5; }

/* FILTER BAR */
.filter-bar { position: fixed; bottom: 66px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #000; border-top: 0.5px solid #1a1a1a; padding: 8px 20px; display: none; gap: 8px; z-index: 48; }
.filter-bar.visible { display: flex; }
.filter-btn { flex: 1; padding: 9px; border-radius: 8px; border: 0.5px solid #222; background: #0a0a0a; color: #555; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
.filter-btn.active { background: #fff; color: #000; border-color: #fff; }

/* BOTTOM BAR */
.bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #000; border-top: 0.5px solid #1a1a1a; padding: 10px 0 24px; display: flex; justify-content: space-around; z-index: 49; }
.bar-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 70px; }
.bar-btn img { width: 26px; height: 26px; object-fit: contain; opacity: 0.35; transition: opacity 0.15s; }
.bar-btn .bar-icon { font-size: 22px; opacity: 0.35; transition: opacity 0.15s; line-height: 1; }
.bar-btn span.bar-label { font-size: 11px; font-weight: 500; color: #444; transition: color 0.15s; }
.bar-btn.active img { opacity: 1; }
.bar-btn.active .bar-icon { opacity: 1; }
.bar-btn.active span.bar-label { color: #fff; }

/* OVERLAY POPUP */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 999; display: none; align-items: center; justify-content: center; padding: 24px; }
.overlay.show { display: flex; }
.popup { background: #111; border: 0.5px solid #2a2a2a; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.9); }
.popup-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.popup-subtitle { font-size: 13px; color: #555; margin-bottom: 24px; }
.popup-label { font-size: 11px; font-weight: 600; color: #555; letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 8px; margin-top: 20px; }
.popup-input { width: 100%; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.popup-textarea { width: 100%; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; height: 90px; }
.stars { display: flex; gap: 10px; margin-top: 4px; }
.star { font-size: 32px; cursor: pointer; color: #2a2a2a; line-height: 1; user-select: none; }
.star.active { color: #fff; }
.popup-actions { display: flex; gap: 10px; margin-top: 28px; }
.btn-cancel { flex: 1; background: transparent; border: 0.5px solid #2a2a2a; border-radius: 10px; color: #555; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 13px; cursor: pointer; }
.btn-send { flex: 2; background: #fff; border: none; border-radius: 10px; color: #000; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 13px; cursor: pointer; }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <img class="logo" src="https://i.postimg.cc/v8LWw36P/Logo-Cynbom.jpg" alt="Cynbom">
  <img src="https://i.postimg.cc/sXtQpG8Z/rate.png" alt="Noter" onclick="ouvrirRate()" style="height:34px;object-fit:contain;cursor:pointer;">
</div>

<!-- PAGE ACCUEIL -->
<div class="page active" id="page-accueil">
  <div id="content"><div class="empty">Chargement...</div></div>
</div>

<!-- PAGE RECHERCHE -->
<div class="page" id="page-recherche">
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Rechercher..." oninput="rechercher()">
  </div>
  <div class="search-results" id="search-results">
    <div class="no-results">Tapez pour rechercher</div>
  </div>
</div>

<!-- PAGE SETTINGS -->
<div class="page" id="page-settings">
  <div class="settings-title">Paramètres</div>
  <div class="settings-item" onclick="window.open('https://mmt-entertaiment.github.io/Cynbom/tos.html', '_blank')">
    <span class="settings-label">Conditions d'utilisation</span>
    <img class="settings-icon" src="https://i.postimg.cc/wvpRcThF/Open.png" alt="Ouvrir">
  </div>
</div>

<!-- FILTER BAR (accueil seulement) -->
<div class="filter-bar visible" id="filter-bar">
  <div class="filter-btn active" id="filter-tout" onclick="setFilter('tout')">Tout</div>
  <div class="filter-btn" id="filter-serie" onclick="setFilter('serie')">Séries</div>
  <div class="filter-btn" id="filter-film" onclick="setFilter('film')">Films</div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bar-btn active" id="btn-accueil" onclick="setPage('accueil')">
    <img src="https://i.postimg.cc/15vwfXBX/Home.png" alt="Accueil">
    <span class="bar-label">Accueil</span>
  </div>
  <div class="bar-btn" id="btn-recherche" onclick="setPage('recherche')">
    <img src="https://i.postimg.cc/bNmksrgd/Search.png" alt="Rechercher">
    <span class="bar-label">Rechercher</span>
  </div>
  <div class="bar-btn" id="btn-settings" onclick="setPage('settings')">
    <img src="https://i.postimg.cc/76bkC7Wn/settings.png" alt="Paramètres">
    <span class="bar-label">Paramètres</span>
  </div>
</div>

<!-- POPUP NOTATION -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-title">Noter Cynbom</div>
    <div class="popup-subtitle">Partagez votre avis avec nous</div>
    <label class="popup-label">Pseudonyme</label>
    <input class="popup-input" id="rate-pseudo" type="text" placeholder="Votre pseudo...">
    <label class="popup-label">Note</label>
    <div class="stars">
      <span class="star" onclick="setStar(1)">☆</span>
      <span class="star" onclick="setStar(2)">☆</span>
      <span class="star" onclick="setStar(3)">☆</span>
      <span class="star" onclick="setStar(4)">☆</span>
      <span class="star" onclick="setStar(5)">☆</span>
    </div>
    <label class="popup-label">Commentaire</label>
    <textarea class="popup-textarea" id="rate-comment" placeholder="Votre avis..."></textarea>
    <div class="popup-actions">
      <button class="btn-cancel" id="btn-cancel">Annuler</button>
      <button class="btn-send" id="btn-send" onclick="envoyerRate()">Envoyer</button>
    </div>
  </div>
</div>

<script>
const API = 'https://cynbom-backend-production.up.railway.app';
let toutesLesSeries = [];
let etoile = 0;
let filtreActuel = 'tout';

// POPUP
document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) fermerRate(); });
document.getElementById('btn-cancel').addEventListener('click', fermerRate);
function ouvrirRate() { document.getElementById('overlay').classList.add('show'); }
function fermerRate() { document.getElementById('overlay').classList.remove('show'); }
function setStar(n) {
  etoile = n;
  document.querySelectorAll('.star').forEach((s, i) => { s.textContent = i < n ? '★' : '☆'; s.classList.toggle('active', i < n); });
}
async function envoyerRate() {
  const pseudo = document.getElementById('rate-pseudo').value.trim();
  const comment = document.getElementById('rate-comment').value.trim();
  if (!pseudo || !etoile) { alert('Remplissez le pseudonyme et la note !'); return; }
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = 'Envoi...';
  const etoiles = '★'.repeat(etoile) + '☆'.repeat(5 - etoile);
  try {
    await fetch('https://discord.com/api/webhooks/1502077408797393078/c41oQnS7_KjpPmgxchI74hgPlqbsGNPGHdxqC__IsKcrRFXrAXoCV3PUaeg1dc6IDLOC', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embeds: [{ title: '⭐ Nouvelle note sur Cynbom', color: 0xffffff, fields: [
        { name: 'Pseudonyme', value: pseudo, inline: true },
        { name: 'Note', value: etoiles + ' (' + etoile + '/5)', inline: true },
        { name: 'Commentaire', value: comment || '_(aucun commentaire)_' }
      ], timestamp: new Date().toISOString() }] })
    });
    fermerRate();
    document.getElementById('rate-pseudo').value = '';
    document.getElementById('rate-comment').value = '';
    setStar(0); etoile = 0;
    alert('Merci pour votre avis ! 🎉');
  } catch(e) { alert("Erreur lors de l'envoi."); }
  btn.disabled = false; btn.textContent = 'Envoyer';
}

// NAVIGATION
function setPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('btn-' + page).classList.add('active');
  document.getElementById('filter-bar').classList.toggle('visible', page === 'accueil');
  if (page === 'recherche') setTimeout(() => document.getElementById('search-input').focus(), 100);
}

// FILTRES
function setFilter(filtre) {
  filtreActuel = filtre;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + filtre).classList.add('active');
  afficherContenu();
}

// HELPERS
function estArriveBientot(titre) {
  const t = titre.toLowerCase();
  return t.includes('(arrive bientôt)') || t.includes('(arrive bientot)') || /\(arrive le \d{2}\/\d{2}\/\d{4}\)/.test(t);
}
function extraireDate(titre) {
  const match = titre.match(/\(arrive le (\d{2}\/\d{2}\/\d{4})\)/i);
  return match ? match[1] : 'Bientôt';
}
function titrePropre(titre) {
  return titre.replace(/\(arrive bientôt\)/gi, '').replace(/\(arrive bientot\)/gi, '').replace(/\(arrive le \d{2}\/\d{2}\/\d{4}\)/gi, '').trim();
}

// HTML BUILDERS
function vignetteHTML(s) {
  const titre = titrePropre(s.titre);
  return `<div class="vignette" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img src="${s.image}" alt="${titre}">` : `<div class="vignette-placeholder">${titre}</div>`}
    <div class="vignette-title">${titre}</div>
  </div>`;
}
function bientotCardHTML(s) {
  const titre = titrePropre(s.titre);
  const date = extraireDate(s.titre);
  return `<div class="bientot-card" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img class="bientot-img" src="${s.image}" alt="${titre}">` : `<div class="bientot-placeholder">${titre}</div>`}
    <div class="bientot-title">${titre}</div>
    <div class="bientot-date">${date}</div>
  </div>`;
}
function serieCardHTML(s) {
  const titre = titrePropre(s.titre);
  return `<div class="serie-card" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img class="serie-thumb" src="${s.image}" alt="${titre}">` : `<div class="serie-thumb-placeholder">${titre}</div>`}
    <div class="serie-info">
      <div class="serie-title-text">${titre}</div>
      <div class="serie-studio">${s.studio || ''}</div>
      <div class="serie-tags">
        ${s.annee ? `<span class="tag">${s.annee}</span>` : ''}
        ${s.age ? `<span class="tag age">${s.age}</span>` : ''}
        ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// AFFICHAGE
function afficherContenu() {
  const content = document.getElementById('content');
  if (toutesLesSeries.length === 0) { content.innerHTML = '<div class="empty">Aucun contenu pour le moment.</div>'; return; }

  const bientot = toutesLesSeries.filter(s => estArriveBientot(s.titre));
  const actifs = toutesLesSeries.filter(s => !estArriveBientot(s.titre));
  const vedette = actifs.find(s => s.vedette);
  const series = actifs.filter(s => !s.vedette && (s.genre || '').toLowerCase().includes('série'));
  const films = actifs.filter(s => !s.vedette && (s.genre || '').toLowerCase().includes('film'));

  let html = '';

  // Vedette
  const afficherVedette = vedette && (filtreActuel === 'tout' ||
    (filtreActuel === 'serie' && (vedette.genre||'').toLowerCase().includes('série')) ||
    (filtreActuel === 'film' && (vedette.genre||'').toLowerCase().includes('film')));

  if (afficherVedette) {
    html += `<div class="vedette-section" onclick="ouvrirSerie('${encodeURIComponent(vedette.titre)}')">
      ${vedette.image ? `<img class="vedette-img" src="${vedette.image}" alt="${titrePropre(vedette.titre)}">` : `<div style="width:100%;height:220px;background:#111;display:flex;align-items:center;justify-content:center;color:#333;font-size:13px;">${titrePropre(vedette.titre)}</div>`}
      <div class="vedette-gradient"></div>
      <div class="vedette-info">
        <div class="vedette-title">${titrePropre(vedette.titre)}</div>
        <div class="vedette-actions">
          <button class="btn-regarder" onclick="event.stopPropagation();ouvrirSerie('${encodeURIComponent(vedette.titre)}')">▶ Regarder</button>
          <button class="btn-savoir" onclick="event.stopPropagation();ouvrirSerie('${encodeURIComponent(vedette.titre)}')">En savoir plus</button>
        </div>
      </div>
    </div>`;
  }

  if (filtreActuel !== 'film' && series.length > 0)
    html += `<div class="section"><div class="section-title">Séries</div><div class="row">${series.map(vignetteHTML).join('')}</div></div>`;

  if (filtreActuel !== 'serie' && films.length > 0)
    html += `<div class="section"><div class="section-title">Films</div><div class="row">${films.map(vignetteHTML).join('')}</div></div>`;

  if (bientot.length > 0)
    html += `<div class="section"><div class="section-title">Arrive bientôt</div><div class="row">${bientot.map(bientotCardHTML).join('')}</div></div>`;

  if (!html) html = '<div class="empty">Aucun contenu dans cette catégorie.</div>';
  content.innerHTML = html;
}

// RECHERCHE
function rechercher() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const results = document.getElementById('search-results');
  if (!q) { results.innerHTML = '<div class="no-results">Tapez pour rechercher</div>'; return; }
  const scored = toutesLesSeries.map(s => {
    let score = 0;
    const titre = titrePropre(s.titre).toLowerCase();
    const studio = (s.studio || '').toLowerCase();
    const genre = (s.genre || '').toLowerCase();
    if (titre === q) score += 100;
    else if (titre.startsWith(q)) score += 80;
    else if (titre.includes(q)) score += 60;
    if (studio.includes(q)) score += 30;
    if (genre.includes(q)) score += 20;
    if (String(s.annee).includes(q)) score += 10;
    q.split(' ').filter(m => m.length > 1).forEach(mot => {
      if (titre.includes(mot)) score += 15;
      if (studio.includes(mot)) score += 8;
      if (genre.includes(mot)) score += 5;
    });
    return { ...s, score };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);
  results.innerHTML = scored.length === 0 ? `<div class="no-results">Aucun résultat pour "${q}"</div>` : scored.map(serieCardHTML).join('');
}

function ouvrirSerie(titre) { window.location.href = `serie.html?titre=${titre}`; }

async function chargerSeries() {
  try {
    const res = await fetch(`${API}/series`);
    toutesLesSeries = await res.json();
    afficherContenu();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Impossible de contacter le serveur.</div>';
  }
}

chargerSeries();
</script>
</body>
</html>
