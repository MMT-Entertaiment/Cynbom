<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cynbom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 400px;
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
  }

  .topbar img.logo {
    height: 30px;
    object-fit: contain;
  }

  .content {
    padding: 0 20px;
    padding-bottom: 100px;
  }

  .serie-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 0.5px solid #1a1a1a;
    cursor: pointer;
  }

  .serie-thumb {
    width: 90px;
    height: 130px;
    border-radius: 8px;
    background: #111;
    flex-shrink: 0;
    border: 0.5px solid #1c1c1c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #333;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 8px;
    line-height: 1.4;
    font-weight: 500;
  }

  .vedette-badge {
    display: inline-block;
    font-size: 10px;
    color: #fff;
    background: #222;
    border: 0.5px solid #444;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  .serie-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .serie-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
  }

  .serie-studio {
    font-size: 12px;
    color: #555;
    font-weight: 400;
  }

  .serie-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .tag {
    font-size: 11px;
    color: #888;
    background: #111;
    border: 0.5px solid #222;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 400;
  }

  .tag.age {
    color: #fff;
    border-color: #333;
    background: #1a1a1a;
  }

  .empty {
    text-align: center;
    color: #333;
    font-size: 14px;
    padding: 60px 0;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 400px;
    background: #000;
    border-top: 0.5px solid #1a1a1a;
    padding: 12px 0 28px;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .bar-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }

  .bar-btn img {
    width: 26px;
    height: 26px;
    object-fit: contain;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .bar-btn.active img { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <img class="logo" src="https://i.postimg.cc/NjYMF0tG/Sans-titre-90-20260506211050.png" alt="Cynbom">
</div>

<div class="content" id="content">
  <div class="empty">Chargement...</div>
</div>

<div class="bottom-bar">
  <div class="bar-btn active" onclick="setTab(this)">
    <img src="https://i.postimg.cc/wvsH0Kz3/Home.png" alt="Accueil">
  </div>
  <div class="bar-btn" onclick="setTab(this)">
    <img src="https://i.postimg.cc/85rDt8Gc/Search.png" alt="Rechercher">
  </div>
</div>

<script>
  const API = 'https://cynbom-backend-production.up.railway.app';

  async function chargerSeries() {
    try {
      const res = await fetch(`${API}/series`);
      const series = await res.json();
      const content = document.getElementById('content');

      if (series.length === 0) {
        content.innerHTML = '<div class="empty">Aucune série pour le moment.</div>';
        return;
      }

      content.innerHTML = series.map(s => `
        <div class="serie-card">
          <div class="serie-thumb">${s.titre}</div>
          <div class="serie-info">
            ${s.vedette ? '<span class="vedette-badge">En vedette</span>' : ''}
            <div class="serie-title">${s.titre}</div>
            <div class="serie-studio">${s.studio || ''}</div>
            <div class="serie-tags">
              ${s.annee ? `<span class="tag">${s.annee}</span>` : ''}
              ${s.age ? `<span class="tag age">${s.age}</span>` : ''}
              ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="empty">Impossible de contacter le serveur.</div>';
    }
  }

  function setTab(el) {
    document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  chargerSeries();
</script>

</body>
</html>
