<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cynbom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 400px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; justify-content: center; padding: 24px 20px 16px; }
  .topbar img.logo { height: 50px; object-fit: contain; }

  /* PAGES */
  .page { display: none; padding: 0 20px; padding-bottom: 110px; }
  .page.active { display: block; }

  /* LISTE SÉRIES */
  .serie-card { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 0.5px solid #1a1a1a; cursor: pointer; transition: opacity 0.15s; }
  .serie-card:active { opacity: 0.6; }
  .serie-thumb { width: 90px; height: 130px; border-radius: 8px; background: #111; flex-shrink: 0; border: 0.5px solid #1c1c1c; object-fit: cover; }
  .serie-thumb-placeholder { width: 90px; height: 130px; border-radius: 8px; background: #111; flex-shrink: 0; border: 0.5px solid #1c1c1c; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #333; text-align: center; padding: 8px; line-height: 1.4; }
  .serie-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .serie-title { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
  .serie-studio { font-size: 12px; color: #555; }
  .serie-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .tag { font-size: 11px; color: #888; background: #111; border: 0.5px solid #222; padding: 3px 8px; border-radius: 4px; }
  .tag.age { color: #fff; border-color: #333; background: #1a1a1a; }
  .vedette-badge { font-size: 10px; color: #fff; background: #222; border: 0.5px solid #444; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; width: fit-content; }
  .empty { text-align: center; color: #333; font-size: 14px; padding: 60px 0; }

  /* RECHERCHE */
  .search-bar-wrap { padding: 12px 0 20px; position: sticky; top: 0; background: #000; z-index: 10; }
  .search-input { width: 100%; background: #111; border: 0.5px solid #222; border-radius: 10px; padding: 12px 16px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: #555; }
  .search-input::placeholder { color: #444; }
  .search-results { }
  .no-results { text-align: center; color: #333; font-size: 14px; padding: 40px 0; }

  /* BOTTOM BAR */
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: #000; border-top: 0.5px solid #1a1a1a; padding: 10px 0 24px; display: flex; justify-content: space-around; align-items: center; }
  .bar-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 70px; }
  .bar-btn img { width: 28px; height: 28px; object-fit: contain; opacity: 0.35; transition: opacity 0.15s; }
  .bar-btn span { font-size: 11px; font-weight: 500; color: #444; transition: color 0.15s; letter-spacing: 0.3px; }
  .bar-btn.active img { opacity: 1; }
  .bar-btn.active span { color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <img class="logo" src="https://i.postimg.cc/v8LWw36P/Logo-Cynbom.jpg" alt="Cynbom">
</div>

<!-- PAGE ACCUEIL -->
<div class="page active" id="page-accueil">
  <div id="content"><div class="empty">Chargement...</div></div>
</div>

<!-- PAGE RECHERCHE -->
<div class="page" id="page-recherche">
  <div class="search-bar-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Rechercher une série, un studio..." oninput="rechercher()">
  </div>
  <div class="search-results" id="search-results">
    <div class="no-results">Tapez pour rechercher</div>
  </div>
</div>

<div class="bottom-bar">
  <div class="bar-btn active" id="btn-accueil" onclick="setPage('accueil')">
    <img src="https://i.postimg.cc/15vwfXBX/Home.png" alt="Accueil">
    <span>Accueil</span>
  </div>
  <div class="bar-btn" id="btn-recherche" onclick="setPage('recherche')">
    <img src="https://i.postimg.cc/bNmksrgd/Search.png" alt="Rechercher">
    <span>Rechercher</span>
  </div>
</div>

<script>
  const API = 'https://cynbom-backend-production.up.railway.app';
  let toutesLesSeries = [];

  function serieCardHTML(s) {
    return `
      <div class="serie-card" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
        ${s.image
          ? `<img class="serie-thumb" src="${s.image}" alt="${s.titre}">`
          : `<div class="serie-thumb-placeholder">${s.titre}</div>`}
        <div class="serie-info">
          ${s.vedette ? '<div class="vedette-badge">En vedette</div>' : ''}
          <div class="serie-title">${s.titre}</div>
          <div class="serie-studio">${s.studio || ''}</div>
          <div class="serie-tags">
            ${s.annee ? `<span class="tag">${s.annee}</span>` : ''}
            ${s.age ? `<span class="tag age">${s.age}</span>` : ''}
            ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
          </div>
        </div>
      </div>`;
  }

  async function chargerSeries() {
    try {
      const res = await fetch(`${API}/series`);
      toutesLesSeries = await res.json();
      const content = document.getElementById('content');
      if (toutesLesSeries.length === 0) {
        content.innerHTML = '<div class="empty">Aucune série pour le moment.</div>';
        return;
      }
      content.innerHTML = toutesLesSeries.map(serieCardHTML).join('');
    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="empty">Impossible de contacter le serveur.</div>';
    }
  }

  function rechercher() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const results = document.getElementById('search-results');

    if (!q) {
      results.innerHTML = '<div class="no-results">Tapez pour rechercher</div>';
      return;
    }

    // Algorithme de recherche : score par pertinence
    const scored = toutesLesSeries.map(s => {
      let score = 0;
      const titre = s.titre.toLowerCase();
      const studio = (s.studio || '').toLowerCase();
      const genre = (s.genre || '').toLowerCase();

      if (titre === q) score += 100;                          // Titre exact
      else if (titre.startsWith(q)) score += 80;             // Début du titre
      else if (titre.includes(q)) score += 60;               // Titre contient
      if (studio.includes(q)) score += 30;                   // Studio
      if (genre.includes(q)) score += 20;                    // Genre
      if (String(s.annee).includes(q)) score += 10;          // Année

      // Recherche par mots
      const mots = q.split(' ').filter(m => m.length > 1);
      mots.forEach(mot => {
        if (titre.includes(mot)) score += 15;
        if (studio.includes(mot)) score += 8;
        if (genre.includes(mot)) score += 5;
      });

      return { ...s, score };
    }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

    if (scored.length === 0) {
      results.innerHTML = '<div class="no-results">Aucun résultat pour "' + q + '"</div>';
    } else {
      results.innerHTML = scored.map(serieCardHTML).join('');
    }
  }

  function setPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('btn-' + page).classList.add('active');
    if (page === 'recherche') {
      setTimeout(() => document.getElementById('search-input').focus(), 100);
    }
  }

  function ouvrirSerie(titre) {
    window.location.href = `serie.html?titre=${titre}`;
  }

  chargerSeries();
</script>
</body>
</html>
