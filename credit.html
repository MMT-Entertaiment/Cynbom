<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits Cynbom</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Google Sans', sans-serif; max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
#content { display: block; width: 100%; }
#content h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; margin-top: 0; }
#content h2 { font-size: 17px; font-weight: 600; margin: 36px 0 12px; padding-top: 36px; border-top: 0.5px solid #1a1a1a; }
#content p { font-size: 14px; color: #aaa; margin-bottom: 12px; line-height: 1.7; }
#content ul { padding-left: 20px; margin-bottom: 12px; }
#content li { font-size: 14px; color: #aaa; margin-bottom: 6px; line-height: 1.7; }
#content strong { color: #fff; font-weight: 600; }
#content a { color: #fff; text-decoration: none; border-bottom: 0.5px solid #333; }
#content a:hover { border-color: #fff; }
#content table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
#content td, #content th { padding: 8px; border: 0.5px solid #1a1a1a; font-size: 14px; color: #aaa; text-align: left; }
.loading { text-align: center; color: #555; padding: 40px; }
.error { text-align: center; color: #333333; padding: 40px 20px; line-height: 1.8; max-width: 100%; }
</style>
</head>
<body>

<div id="content" class="loading">Chargement...</div>

<script>
fetch('credit.md')
  .then(response => {
    if (!response.ok) throw new Error('Fichier non trouvé');
    return response.text();
  })
  .then(markdown => {
    document.getElementById('content').innerHTML = marked.parse(markdown);
    document.getElementById('content').classList.remove('loading');
  })
  .catch(error => {
    document.getElementById('content').innerHTML = '<div class="error">Erreur lors de la récupération des Crédits de Cynbom, veuillez utiliser le bouton de review dans l\'accueil pour nous faire par de tout problème rencontré sur Cynbom en utilisant votre <span style="color: #FFFFFF;">@Wumpus</span> <span style="color: #5865F2;">Discord</span> en tant que pseudonyme, nous vous répondront via DM <span style="color: #5865F2;">Discord</span>.</div>';
    document.getElementById('content').classList.remove('loading');
    console.error('Erreur:', error);
  });
</script>
<div class="footer">
  <p></p>© 2024-2026 MMT Entertaiment - Studio créatif indépendant</p>
  <p style="margin-top: 10px; font-style: italic;">Cynbom est un catalogue indépendant et n'est en aucun cas affilié ou soutenu par les studios dont les œuvres sont répertoriées. Tous les droits appartiennent à leurs créateurs respectifs.</p>
  <a href="https://mmt-entertaiment.github.io/Cynbom/" style="display:inline-block; margin-top:24px;">← Retourné à l'accueil</a>
</div>
</body>
</html>
