<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cynbom - Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html, body{
    width:100%;
    height:100%;
    background:#000000;
    font-family:'Google Sans', sans-serif;
  }
  .cynbom-logo-circle{
    position:fixed;
    top:8px;
    left:8px;
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    background:#000000;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid #1a1a1a;
    z-index:100;
  }
  .cynbom-logo-circle img{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  .cynbom-nav-bar{
    position:fixed;
    top:8px;
    left:96px;
    right:8px;
    height:80px;
    border-radius:40px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    padding:0 8px;
    overflow:hidden;
    z-index:100;
    max-width:400px;
    margin:0 auto;
  }
  .nav-bubble{
    position:relative;
    flex:1;
    height:64px;
    padding:0 4px;
    border-radius:32px;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:#000000;
    font-family:'Google Sans', sans-serif;
    font-size:10px;
    text-align:center;
    white-space:nowrap;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s ease;
    flex-shrink:1;
    min-width:0;
  }
  .nav-bubble:hover{
    transform:scale(1.02);
    box-shadow:0 4px 12px rgba(255,255,255,0.2);
  }
  .nav-bubble:active{
    transform:scale(0.95);
  }
  .nav-bubble img{
    width:20px;
    height:20px;
    object-fit:contain;
    flex-shrink:0;
    filter:brightness(0);
  }
  .nav-bubble span{
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1;
  }

  /* FILTER BAR */
  .filter-bar{
    position:fixed;
    top:100px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:390px;
    background:#1a1a1a;
    padding:5px;
    display:flex;
    justify-content:center;
    gap:6px;
    z-index:99;
    border:none !important;
    border-bottom:none !important;
    box-shadow:none !important;
    border-radius:25px;
    margin:0 auto;
  }
  .filter-btn{
    padding:10px 24px;
    border-radius:20px;
    border:1px solid #333;
    background:#0a0a0a;
    color:#666;
    font-family:'Google Sans',sans-serif;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s ease;
    white-space:nowrap;
    flex-shrink:1;
    flex:1;
    text-align:center;
  }
  .filter-btn:hover{
    border-color:#444;
  }
  .filter-btn.active{
    background:#ffffff;
    color:#000000;
    border-color:#ffffff;
  }

  /* PAGE CONTENT */
  .page{
    display:none;
    padding:0 0 160px;
  }
  .page.active{
    display:block;
  }
  #page-recherche{
    padding-top:140px;
  }
  #page-parametres{
    overflow:hidden;
    max-height:calc(100vh - 160px);
  }
  .page-wrapper{
    padding-top:155px;
    max-width:400px;
    margin:0 auto;
    color:#ffffff;
  }

  /* EN VEDETTE */
  .vedette-section{position:relative;cursor:pointer;}
  .vedette-img{width:100%;height:220px;object-fit:cover;display:block;}
  .vedette-gradient{position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(to bottom, transparent, #000);}
  .vedette-info{position:absolute;bottom:0;left:0;right:0;padding:16px 20px;}
  .vedette-title{font-size:22px;font-weight:600;margin-bottom:10px;}
  .vedette-actions{display:flex;gap:8px;}
  .btn-regarder{display:flex;align-items:center;gap:6px;background:#fff;color:#000;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;font-family:'Google Sans',sans-serif;cursor:pointer;}
  .btn-savoir{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;font-family:'Google Sans',sans-serif;cursor:pointer;}

  /* SECTIONS */
  .section{margin-bottom:24px;padding-top:8px;}
  .section-title{font-size:14px;font-weight:600;padding:0 20px;margin-bottom:12px;}
  .row{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none;}
  .row::-webkit-scrollbar{display:none;}
  .vignette{flex-shrink:0;width:100px;cursor:pointer;}
  .vignette img{width:100px;height:145px;border-radius:8px;object-fit:cover;display:block;background:#111;}
  .vignette.ost img{height:100px;}
  .vignette-placeholder{width:100px;height:145px;border-radius:8px;background:#111;border:0.5px solid #1c1c1c;display:flex;align-items:center;justify-content:center;font-size:9px;color:#555;}
  .vignette-title{font-size:11px;font-weight:500;color:#aaa;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .bientot-card{flex-shrink:0;width:140px;cursor:pointer;}
  .bientot-img{width:140px;height:80px;border-radius:8px;object-fit:cover;display:block;background:#111;}
  .bientot-placeholder{width:140px;height:80px;border-radius:8px;background:#111;border:0.5px solid #1c1c1c;display:flex;align-items:center;justify-content:center;font-size:9px;color:#555;}
  .bientot-title{font-size:11px;font-weight:500;color:#aaa;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bientot-date{font-size:10px;color:#555;margin-top:2px;}

  .empty{text-align:center;color:#333;font-size:14px;padding:60px 0;}

  .search-wrap{padding:5px;position:fixed;top:100px;background:#1a1a1a;z-index:98;border:none !important;border-bottom:none !important;border-radius:25px;width:390px;left:50%;transform:translateX(-50%);display:flex;justify-content:center;align-items:center;}
  .search-input-wrapper{position:relative;width:100%;display:flex;align-items:center;}
  .search-input{width:100%;background:#111;border:0.5px solid #222;border-radius:20px;padding:12px 40px 12px 16px;color:#fff;font-family:'Google Sans',sans-serif;font-size:14px;outline:none;}
  .search-clear{position:absolute;right:12px;background:none;border:none;color:#FFFFFF;font-size:20px;cursor:pointer;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:300;}

  .search-results{padding:0 20px;margin-top:5px;max-width:390px;margin-left:auto;margin-right:auto;}
  .no-results{text-align:center;color:#333;font-size:14px;padding:40px 0;}
  .serie-card{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:0.5px solid #1a1a1a;cursor:pointer;}
  .serie-thumb{width:90px;height:130px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#111;}
  .serie-thumb-placeholder{width:90px;height:130px;border-radius:8px;flex-shrink:0;background:#111;border:0.5px solid #1c1c1c;display:flex;align-items:center;justify-content:center;font-size:9px;color:#555;}
  .serie-info{flex:1;display:flex;flex-direction:column;gap:5px;}
  .serie-title-text{font-size:15px;font-weight:600;color:#ffffff;font-family:'Google Sans',sans-serif;}
  .serie-studio{font-size:12px;color:#555;font-family:'Google Sans',sans-serif;}
  .serie-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .tag{font-size:11px;color:#888;background:#111;border:0.5px solid #222;padding:3px 8px;border-radius:4px;}
  .tag.age{color:#fff;border-color:#333;background:#1a1a1a;}

  /* SETTINGS */
  .settings-title{font-size:22px;font-weight:600;padding:20px 20px 16px;margin-top:100px;color:#ffffff;font-family:'Google Sans',sans-serif;}
  .settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid #1a1a1a;cursor:pointer;}
  .settings-item:active{opacity:0.6;}
  .settings-label{font-size:14px;font-weight:500;color:#ffffff;font-family:'Google Sans',sans-serif;}
  .settings-icon{width:20px;height:20px;object-fit:contain;opacity:0.5;}
</style>
</head>
<body>

<!-- LOGO CIRCLE -->
<div class="cynbom-logo-circle">
  <img src="https://i.postimg.cc/v8LWw36P/Logo-Cynbom.jpg" alt="Cynbom">
</div>

<!-- NAVIGATION BAR -->
<div class="cynbom-nav-bar">
  <div class="nav-bubble" onclick="setPage('accueil')">
    <img src="https://i.postimg.cc/15vwfXBX/Home.png" alt="Accueil">
    <span>Accueil</span>
  </div>
  <div class="nav-bubble" onclick="setPage('recherche')">
    <img src="https://i.postimg.cc/bNmksrgd/Search.png" alt="Rechercher">
    <span>Rechercher</span>
  </div>
  <div class="nav-bubble" onclick="setPage('parametres')">
    <img src="https://i.postimg.cc/76bkC7Wn/settings.png" alt="Paramètres">
    <span>Paramètres</span>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <div class="filter-btn active" id="filter-tout" onclick="setFilter('tout')">Tout</div>
  <div class="filter-btn" id="filter-serie" onclick="setFilter('serie')">Séries</div>
  <div class="filter-btn" id="filter-film" onclick="setFilter('film')">Films</div>
  <div class="filter-btn" id="filter-ost" onclick="setFilter('ost')">OST</div>
</div>

<!-- PAGE ACCUEIL -->
<div class="page active" id="page-accueil">
  <div class="page-wrapper">
    <div id="content"><div class="empty">Chargement...</div></div>
  </div>
</div>

<!-- PAGE RECHERCHE -->
<div class="page" id="page-recherche">
  <div class="search-wrap">
    <div class="search-input-wrapper">
      <input class="search-input" id="search-input" type="text" placeholder="Rechercher..." oninput="rechercher()" autocomplete="off">
      <button class="search-clear" onclick="document.getElementById('search-input').value=''; document.getElementById('search-results').innerHTML=''">×</button>
    </div>
  </div>
  <div class="search-results" id="search-results">
  </div>
</div>

<!-- PAGE SETTINGS -->
<div class="page" id="page-parametres">
  <div class="settings-title">Paramètres</div>
  <div class="settings-item" onclick="window.location.href='https://mmt-entertaiment.github.io/Cynbom/tos.html'">
    <span class="settings-label">Conditions d'utilisation</span>
    <img class="settings-icon" src="https://i.postimg.cc/wvpRcThF/Open.png" alt="Ouvrir">
  </div>
  <div class="settings-item" onclick="window.location.href='https://mmt-entertaiment.github.io/Cynbom/credit.html'">
    <span class="settings-label">Crédits</span>
    <img class="settings-icon" src="https://i.postimg.cc/wvpRcThF/Open.png" alt="Ouvrir">
  </div>
</div>

<script>
const API = 'https://cynbom-backend-production.up.railway.app';
let toutesLesSeries = [];
let filtreActuel = 'tout';

function estArriveBientot(titre) {
  const t = titre.toLowerCase();
  return t.includes('(arrive bientôt)') || t.includes('(arrive bientot)') || /\(arrive le \d{2}\/\d{2}\/\d{4}\)/.test(t);
}

function titrePropre(titre) {
  return titre.replace(/\(arrive bientôt\)/gi, '').replace(/\(arrive bientot\)/gi, '').replace(/\(arrive le \d{2}\/\d{2}\/\d{4}\)/gi, '').trim();
}

function extraireDate(titre) {
  const match = titre.match(/\(arrive le (\d{2}\/\d{2}\/\d{4})\)/i);
  return match ? match[1] : 'Bientôt';
}

// HTML BUILDERS
function vignetteHTML(s) {
  const titre = titrePropre(s.titre);
  const isOST = (s.genre || '').toLowerCase().includes('ost');
  return `<div class="vignette${isOST ? ' ost' : ''}" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img src="${s.image}" alt="${titre}">` : `<div class="vignette-placeholder">${titre}</div>`}
    <div class="vignette-title">${titre}</div>
  </div>`;
}

function bientotCardHTML(s) {
  const titre = titrePropre(s.titre);
  const date = extraireDate(s.titre);
  return `<div class="bientot-card" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img class="bientot-img" src="${s.image}" alt="${titre}">` : `<div class="bientot-placeholder">${titre}</div>`}
    <div class="bientot-title">${titre}</div>
    <div class="bientot-date">${date}</div>
  </div>`;
}

function serieCardHTML(s) {
  const titre = titrePropre(s.titre);
  return `<div class="serie-card" onclick="ouvrirSerie('${encodeURIComponent(s.titre)}')">
    ${s.image ? `<img class="serie-thumb" src="${s.image}" alt="${titre}">` : `<div class="serie-thumb-placeholder">${titre}</div>`}
    <div class="serie-info">
      <div class="serie-title-text">${titre}</div>
      <div class="serie-studio">${s.studio || ''}</div>
      <div class="serie-tags">
        ${s.annee ? `<span class="tag">${s.annee}</span>` : ''}
        ${s.age ? `<span class="tag age">${s.age}</span>` : ''}
        ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// AFFICHAGE
function afficherContenu() {
  const content = document.getElementById('content');
  if (toutesLesSeries.length === 0) { content.innerHTML = '<div class="empty">Aucun contenu pour le moment.</div>'; return; }

  const bientot = toutesLesSeries.filter(s => estArriveBientot(s.titre));
  const actifs = toutesLesSeries.filter(s => !estArriveBientot(s.titre));
  const vedette = actifs.find(s => s.vedette);
  const series = actifs.filter(s => !s.vedette && !estArriveBientot(s.titre) && (s.genre || '').toLowerCase().includes('série'));
  const films = actifs.filter(s => !s.vedette && !estArriveBientot(s.titre) && (s.genre || '').toLowerCase().includes('film'));
  const osts = actifs.filter(s => !s.vedette && !estArriveBientot(s.titre) && (s.genre || '').toLowerCase().includes('ost'));

  let html = '';

  const afficherVedette = vedette && (filtreActuel === 'tout' ||
    (filtreActuel === 'serie' && (vedette.genre||'').toLowerCase().includes('série')) ||
    (filtreActuel === 'film' && (vedette.genre||'').toLowerCase().includes('film')));

  if (afficherVedette) {
    html += `<div class="vedette-section" onclick="ouvrirSerie('${encodeURIComponent(vedette.titre)}')">
      ${vedette.image ? `<img class="vedette-img" src="${vedette.image}" alt="${titrePropre(vedette.titre)}">` : `<div style="width:100%;height:220px;background:#111;display:flex;align-items:center;justify-content:center;font-size:12px;color:#555;">${titrePropre(vedette.titre)}</div>`}
      <div class="vedette-gradient"></div>
      <div class="vedette-info">
        <div class="vedette-title">${titrePropre(vedette.titre)}</div>
        <div class="vedette-actions">
          <button class="btn-regarder" onclick="event.stopPropagation();ouvrirSerie('${encodeURIComponent(vedette.titre)}')">▶ Regarder</button>
          <button class="btn-savoir" onclick="event.stopPropagation();ouvrirSerie('${encodeURIComponent(vedette.titre)}')">En savoir plus</button>
        </div>
      </div>
    </div>`;
  }

  if (filtreActuel !== 'film' && filtreActuel !== 'ost' && series.length > 0)
    html += `<div class="section"><div class="section-title">Séries</div><div class="row">${series.map(vignetteHTML).join('')}</div></div>`;

  if (filtreActuel !== 'serie' && filtreActuel !== 'ost' && films.length > 0)
    html += `<div class="section"><div class="section-title">Films</div><div class="row">${films.map(vignetteHTML).join('')}</div></div>`;

  if ((filtreActuel === 'tout' || filtreActuel === 'ost') && osts.length > 0)
    html += `<div class="section"><div class="section-title">OST</div><div class="row">${osts.map(vignetteHTML).join('')}</div></div>`;

  if (filtreActuel === 'tout' || filtreActuel === 'serie' || filtreActuel === 'film') {
    const tousActifs = [...series, ...films];
    const genres = {};
    tousActifs.forEach(s => {
      const genreRaw = (s.genre || '').replace(/^(série|film)[^|]*\|\s*/i, '').trim();
      if (!genreRaw || genreRaw === '') return;
      if (!genres[genreRaw]) genres[genreRaw] = [];
      genres[genreRaw].push(s);
    });
    Object.entries(genres).forEach(([genre, list]) => {
      const filtered = list.filter(s =>
        filtreActuel === 'tout' ||
        (filtreActuel === 'serie' && (s.genre||'').toLowerCase().includes('série')) ||
        (filtreActuel === 'film' && (s.genre||'').toLowerCase().includes('film'))
      );
      if (filtered.length > 0)
        html += `<div class="section"><div class="section-title">${genre}</div><div class="row">${filtered.map(vignetteHTML).join('')}</div></div>`;
    });
  }

  if (bientot.length > 0)
    html += `<div class="section"><div class="section-title">Arrive bientôt</div><div class="row">${bientot.map(bientotCardHTML).join('')}</div></div>`;

  if (!html) html = '<div class="empty">Aucun contenu dans cette catégorie.</div>';
  content.innerHTML = html;
}

// RECHERCHE
function rechercher() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const results = document.getElementById('search-results');
  if (!q) { results.innerHTML = ''; return; }
  const scored = toutesLesSeries.map(s => {
    let score = 0;
    const titre = titrePropre(s.titre).toLowerCase();
    const studio = (s.studio || '').toLowerCase();
    const genre = (s.genre || '').toLowerCase();
    if (titre === q) score += 100;
    else if (titre.startsWith(q)) score += 80;
    else if (titre.includes(q)) score += 60;
    if (studio.includes(q)) score += 30;
    if (genre.includes(q)) score += 20;
    if (String(s.annee).includes(q)) score += 10;
    q.split(' ').filter(m => m.length > 1).forEach(mot => {
      if (titre.includes(mot)) score += 15;
      if (studio.includes(mot)) score += 8;
      if (genre.includes(mot)) score += 5;
    });
    return { ...s, score };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);
  results.innerHTML = scored.length === 0 ? `<div class="no-results">Aucun résultat pour "${q}"</div>` : scored.map(serieCardHTML).join('');
}

function ouvrirSerie(titre) { window.location.href = `serie.html?titre=${titre}`; }

// NAVIGATION
function setPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-bubble').forEach(b => b.style.opacity = '0.6');
  document.getElementById('page-' + page).classList.add('active');
  event.target.closest('.nav-bubble').style.opacity = '1';
  document.getElementById('filter-bar').style.display = page === 'accueil' ? 'flex' : 'none';
  if (page === 'recherche') setTimeout(() => document.getElementById('search-input').focus(), 100);
}

// FILTRES
function setFilter(filtre) {
  filtreActuel = filtre;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + filtre).classList.add('active');
  afficherContenu();
}

async function chargerSeries() {
  try {
    const res = await fetch(`${API}/series`);
    toutesLesSeries = await res.json();
    afficherContenu();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Impossible de contacter le serveur.</div>';
  }
}

// Set initial active button
window.addEventListener('load', () => {
  document.querySelectorAll('.nav-bubble')[0].style.opacity = '1';
  chargerSeries();
});
</script>
</body>
</html>
